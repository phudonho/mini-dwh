services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: dwh
      POSTGRES_PASSWORD: dwh
      POSTGRES_DB: dwh
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d

  metabase:
    image: metabase/metabase:latest
    ports:
      - "3000:3000"
    depends_on:
      - postgres

  dbt:
    build:
      context: ./dbt
      dockerfile: Dockerfile
    working_dir: /usr/app
    volumes:
      - ./dbt:/usr/app/dbt
    depends_on:
      - postgres
   

volumes:
  pgdata:
