version: 2

models:
  - name: stg_customers
    columns:
      - name: customer_id
        tests: [not_null, unique]

  - name: stg_accounts
    columns:
      - name: account_id
        tests: [not_null, unique]
      - name: customer_id
        tests: [not_null]

  - name: stg_transactions
    columns:
      - name: txn_id
        tests: [not_null, unique]
      - name: txn_type
        tests:
          - accepted_values:
              values: ["PAYMENT", "TRANSFER", "CASHIN", "CASHOUT"]